<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Digitales Eisenbahnbetriebsfeld</title>
</head>
<body>
  <main class="landing-page d-flex align-items-center justify-content-center">
    <section class="landing-card">
      <h1 class="landing-title">Digitales Eisenbahnbetriebsfeld</h1>
      <p class="landing-description">
        Koordiniere Züge, löse Engpässe und halte den Fahrplan im Team unter Kontrolle.
      </p>

      <div id="onlineActions">
        <div class="join-row">
          <input
            id="joinNameInput"
            type="text"
            class="form-control"
            placeholder="Dein Name"
            aria-label="Dein Name"
          >
          <input
            id="joinCodeInput"
            type="text"
            class="form-control"
            placeholder="Game-Code"
            aria-label="Game-Code"
          >
          <button id="joinGameButton" type="button" class="btn btn-success">
            Teilnehmen
          </button>
        </div>

        <div class="host-section">
          <p class="host-description">
            Starte ein neues Spiel als Admin, teile den Code und lade deine Freunde ein.
          </p>
          <button id="hostGameButton" type="button" class="btn btn-outline-light">
            Neues Spiel starten
          </button>
        </div>
      </div>

      <div id="serverUnavailableMessage" class="server-error-box d-none" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> Der Server ist derzeit nicht erreichbar. Somit kannst du das Spiel nicht starten.
      </div>
    </section>

    <div class="modal fade" id="licenceKeyModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Lizenzschlüssel eingeben</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input id="licenceKeyInput" type="text" class="form-control" placeholder="Lizenzschlüssel" />
            <div id="licenceKeyError" class="invalid-feedback"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
            <button id="confirmHostButton" type="button" class="btn btn-success">Spiel starten</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
